<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Contact Us</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://kit.fontawesome.com/f433770b08.css" crossorigin="anonymous">
        <link rel="stylesheet" href="css/main.min.css">
    </head>
    <body>

        <section class="bg-dominic-header text-light d-flex flex-column justify-content-center align-items-center pb-5">
            <h1 class="fw-bold">Contact Us</h1>
            <h2>You can <span class="auto-type"></span></h2>
        </section>

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3850.6165033062375!2d120.5716867150449!3d15.179391489435936!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3396ed78768caadd%3A0x960feca612607c8f!2sWest%20Aeropark!5e0!3m2!1sen!2sph!4v1677297611833!5m2!1sen!2sph" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

        <div class="container mt-3 shadow-lg p-3 m-5 text-center bg-light rounded">
            <h2>Give us a Call - TLC-888</h2>
            <h1 class="text-relaxtone">(02)852-8888</h1>
        </div>

        <div class="container mt-3 shadow-lg p-3 m-5 text-center bg-light rounded">
            <h2>Send Us an Email</h2>
            <h1 class="text-relaxtone">contact@tlconline.ph</h1>
        </div>

        <div class="container mt-3 shadow-lg p-3 m-5 text-center bg-light rounded">
            <h2>Give Us a Comment</h2>
            <div>
              <label for="name" class="form-label">Name</label>
              <input class="form-control form-control-lg" id="name" type="text">
            </div>
            <div>
              <label for="email" class="form-label">Email</label>
              <input class="form-control form-control-lg" id="email" type="email">
            </div>
            <div class="form-floating mt-2">
              <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea" style="height: 100px"></textarea>
              <label for="floatingTextarea">Comments</label>
            </div>
            <button class="btn btn-relaxtone mt-2">Send</button>
        </div>

    </body>
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/f433770b08.js" crossorigin="anonymous"></script>
    <script type="module" src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script>
      let typed = new Typed(".auto-type", {
        strings: ["Visit our Office", "Give Us a Call", "Send Us an Email", "Give Us a Comment"],
        typedSpeed: 250,
        backSpeed: 250,
        loop: true,
      });
    </script>
</html>
