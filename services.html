<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Services</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://kit.fontawesome.com/f433770b08.css" crossorigin="anonymous">
        <link rel="stylesheet" href="css/main.min.css">
    </head>
    <body>

        <section class="bg-dominic-header text-light d-flex flex-column justify-content-center align-items-center pb-5">
            <h1 class="fw-bold">Services</h1>
            <h2>We are here to <span class="auto-type"></span></h2>
        </section>

        <div class="container my-4">
            <div class="row d-flex flex-row flex-wrap g-4" id="catalog">
            </div>
        </div>

    </body>
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/f433770b08.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script>
      let typed = new Typed(".auto-type", {
        strings: ["Help You", "Guide You", "Support You", "Listen to You", "Give Your Answers", "Treat You", "Save You"],
        typedSpeed: 250,
        backSpeed: 250,
        loop: true,
      });
    </script>
    <script type="module" src="js/main.js"></script>
</html>
